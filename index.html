<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>豪豪出包 | 時間萃取的酸種滋味</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+TC:wght@400;700&family=Noto+Serif+TC:wght@700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <!-- 重要修正：務必加上 defer，確保所有邏輯載入後才啟動 Alpine.js -->
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <script>
        window.tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandBg: '#D9C5B2',
                        brandSurface: '#F3F3F4',
                        brandTextBold: '#14110F',
                        brandTextMain: '#34312D',
                        brandAccent: '#B37BA4',
                        brandLavender: '#DCCDE8',
                    },
                    fontFamily: {
                        serif: ['"Playfair Display"', '"Noto Serif TC"', 'serif'],
                        sans: ['Inter', '"Noto Sans TC"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #D9C5B2; color: #34312D; overflow-x: hidden; }
        .glass-nav { backdrop-filter: blur(10px); background: rgba(243, 243, 244, 0.9); }
        .product-desc { white-space: pre-line; } 
        .active-scale:active { transform: scale(0.96); transition: transform 0.1s; }
    </style>
</head>
<body class="font-sans antialiased" x-data="cookieShop">

    <!-- 導覽列 -->
    <nav class="sticky top-0 z-50 glass-nav shadow-sm px-4 py-3 flex justify-between items-center">
        <div class="flex items-center gap-2" @dblclick="showAdmin = true">
            <div class="w-10 h-10 bg-brandAccent rounded-full flex items-center justify-center text-white font-bold font-serif shadow-sm">豪</div>
            <h1 class="font-serif text-xl font-bold tracking-tight text-brandTextBold">豪豪出包</h1>
        </div>
        <div class="flex items-center gap-4">
            <button @click="showCart = true" class="relative p-2 text-brandTextMain active-scale">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                </svg>
                <span x-show="cartCount > 0" x-text="cartCount" class="absolute top-0 right-0 bg-brandAccent text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center"></span>
            </button>
        </div>
    </nav>

    <!-- 主視覺 (品牌形象圖) -->
    <header class="relative w-full h-[45vh] min-h-[350px] overflow-hidden">
        <img src="https://images.unsplash.com/photo-1509440159596-0249088772ff?auto=format&fit=crop&q=80&w=1200" alt="[Hero Image 豪豪出包形象圖]" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-black/40 flex flex-col justify-center items-center text-white p-6 text-center">
            <p class="text-xs tracking-[0.4em] uppercase mb-3 font-light italic">時間萃取的酸種滋味</p>
            <h2 class="font-serif text-4xl mb-4 leading-tight">每一片都是驚喜</h2>
            <div class="w-12 h-[1px] bg-white/50 mb-5"></div>
            <p class="max-w-[280px] text-sm leading-relaxed opacity-90">堅持純天然、長時發酵，將大地的饋贈裝進每一包餅乾中。</p>
        </div>
    </header>

    <!-- 狀態列 -->
    <div x-show="!isOrderOpen" x-cloak class="bg-brandTextBold text-white text-center py-3 text-xs font-bold sticky top-[64px] z-40">
        ● 目前訂單已截止，歡迎瀏覽產品資訊
    </div>

    <!-- 產品清單 -->
    <main class="max-w-xl mx-auto p-5 pb-32">
        <div class="grid grid-cols-1 gap-12">
            <template x-for="product in products" :key="product.id">
                <div class="bg-brandSurface rounded-[2.5rem] overflow-hidden shadow-sm border border-black/5 flex flex-col">
                    <div class="aspect-[4/3] bg-gray-200 overflow-hidden relative">
                        <img :src="getImage(product)" :alt="product.name" class="w-full h-full object-cover">
                        <div class="absolute top-4 right-4 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[10px] font-bold text-brandAccent" x-text="product.weight"></div>
                    </div>
                    
                    <div class="p-8">
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="font-serif text-2xl font-bold text-brandTextBold" x-text="product.name"></h3>
                            <span class="text-xl font-bold text-brandAccent" x-text="`$${product.price}`"></span>
                        </div>
                        <p class="product-desc text-sm text-brandTextMain/80 leading-relaxed mb-6" x-text="product.description"></p>
                        
                        <div x-data="{ open: false }" class="mb-8">
                            <button @click="open = !open" class="text-[10px] font-bold uppercase tracking-widest text-gray-400 flex items-center gap-1">
                                顯示成分來源 <span x-text="open ? '↑' : '↓'"></span>
                            </button>
                            <p x-show="open" x-cloak x-text="product.ingredients" class="mt-2 text-xs text-gray-400 leading-loose bg-white/50 p-3 rounded-xl"></p>
                        </div>

                        <div class="mt-auto">
                            <template x-if="isOrderOpen">
                                <div class="flex items-center gap-3">
                                    <template x-if="getItemCount(product.id) === 0">
                                        <button @click="addToCart(product)" class="w-full bg-brandAccent text-white py-4 rounded-2xl text-sm font-bold active-scale shadow-lg shadow-brandAccent/20">
                                            加入購物車
                                        </button>
                                    </template>
                                    <template x-if="getItemCount(product.id) > 0">
                                        <div class="flex items-center justify-between w-full bg-white rounded-2xl p-1 border border-brandAccent/10">
                                            <button @click="updateQty(product.id, -1)" class="w-12 h-12 flex items-center justify-center text-brandAccent font-bold active-scale">－</button>
                                            <span x-text="getItemCount(product.id)" class="font-bold text-brandTextBold text-lg"></span>
                                            <button @click="updateQty(product.id, 1)" class="w-12 h-12 flex items-center justify-center text-brandAccent font-bold active-scale">＋</button>
                                        </div>
                                    </template>
                                </div>
                            </template>
                            <template x-if="!isOrderOpen">
                                <div class="text-center py-4 px-4 bg-gray-200 rounded-2xl text-xs text-gray-500 font-bold italic">目前非收單時段</div>
                            </template>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <!-- 浮動購物車按鈕 -->
    <div x-show="cartCount > 0 && !showCart && step === 1" x-cloak 
         class="fixed bottom-8 left-6 right-6 z-50">
        <button @click="showCart = true" class="w-full bg-brandTextBold text-white py-5 rounded-[2rem] shadow-2xl flex justify-between px-10 items-center active-scale">
            <span class="font-bold tracking-widest">查看您的清單</span>
            <span x-text="`$${total}`" class="bg-white/20 px-4 py-1 rounded-full text-sm font-mono"></span>
        </button>
    </div>

    <!-- 購物車 Modal -->
    <div x-show="showCart" x-cloak class="fixed inset-0 z-[100] flex items-end justify-center">
        <div @click="showCart = false" class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
        <div class="relative bg-white w-full max-w-lg rounded-t-[3rem] p-8 shadow-2xl overflow-y-auto max-h-[85vh]">
            <div class="w-12 h-1 bg-gray-200 rounded-full mx-auto mb-8"></div>
            <h3 class="text-3xl font-serif font-bold text-brandTextBold mb-8 text-center">購物清單</h3>
            <div x-show="cart.length === 0" class="text-center py-16 text-gray-300">清單目前是空的</div>
            <div x-show="cart.length > 0" class="space-y-6">
                <template x-for="item in cart" :key="item.id">
                    <div class="flex justify-between items-center border-b border-gray-50 pb-4">
                        <div class="flex-1">
                            <p class="font-bold text-brandTextBold" x-text="item.name"></p>
                            <p class="text-xs text-brandAccent" x-text="`$${item.price} x ${item.qty}`"></p>
                        </div>
                        <div class="flex items-center gap-4 bg-gray-50 rounded-xl p-1">
                            <button @click="updateQty(item.id, -1)" class="w-8 h-8 font-bold">-</button>
                            <span x-text="item.qty" class="font-bold"></span>
                            <button @click="updateQty(item.id, 1)" class="w-8 h-8 font-bold">+</button>
                        </div>
                    </div>
                </template>
                <div class="bg-brandSurface p-6 rounded-3xl space-y-2 mt-8">
                    <div class="flex justify-between text-sm"><span>小計</span><span x-text="`$${subtotal}`"></span></div>
                    <div class="flex justify-between text-sm"><span>運費</span><span>$60</span></div>
                    <div class="flex justify-between font-bold text-xl pt-4 border-t text-brandAccent"><span>總計</span><span x-text="`$${total}`"></span></div>
                </div>
                <button @click="step = 2; showCart = false" class="w-full bg-brandAccent text-white py-5 rounded-[2rem] font-bold shadow-xl active-scale">填寫配送資訊</button>
            </div>
        </div>
    </div>

    <!-- 結帳表單 -->
    <div x-show="step === 2" x-cloak class="fixed inset-0 z-[110] bg-white overflow-y-auto p-8">
        <div class="max-w-md mx-auto">
            <button @click="step = 1; showCart = true" class="mb-8 text-gray-400 font-bold active-scale">← 返回</button>
            <h3 class="text-3xl font-serif font-bold mb-8">收件資訊</h3>
            <form @submit.prevent="submitOrder" class="space-y-6 text-sm">
                <div><label class="font-bold text-gray-400 mb-2 block">中文姓名 *</label><input type="text" x-model="formData.customer_name" required class="w-full bg-gray-50 rounded-2xl p-4 outline-none"></div>
                <div><label class="font-bold text-gray-400 mb-2 block">IG 帳號 *</label><input type="text" x-model="formData.ig_account" required class="w-full bg-gray-50 rounded-2xl p-4 outline-none"></div>
                <div><label class="font-bold text-gray-400 mb-2 block">手機號碼 *</label><input type="tel" x-model="formData.phone" pattern="^09[0-9]{8}$" required class="w-full bg-gray-50 rounded-2xl p-4 outline-none"></div>
                <div><label class="font-bold text-gray-400 mb-2 block">7-11 門市名稱 *</label><input type="text" x-model="formData.seven_eleven_store" required class="w-full bg-gray-50 rounded-2xl p-4 outline-none"></div>
                <button type="submit" :disabled="submitting" class="w-full bg-brandAccent text-white py-5 rounded-[2rem] font-bold shadow-xl active-scale disabled:opacity-50">確認下單</button>
            </form>
        </div>
    </div>

    <!-- 下單成功 -->
    <div x-show="step === 3" x-cloak class="fixed inset-0 z-[120] bg-brandBg flex items-center justify-center p-8 text-center">
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl max-w-sm w-full">
            <div class="w-16 h-16 bg-green-50 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6">✓</div>
            <h3 class="text-2xl font-serif font-bold mb-4 text-brandTextBold">下單成功</h3>
            <div class="bg-gray-50 p-6 rounded-2xl text-left text-xs mb-6 space-y-1">
                <p>銀行：(000) 某某銀行</p>
                <p>帳號：XXX-XXXX-XXXX-XXXX</p>
                <p class="pt-4 font-bold text-brandAccent text-lg">總額：$<span x-text="total"></span></p>
            </div>
            <p class="text-[10px] text-gray-400 mb-8 leading-relaxed">請於匯款後私訊 IG 告知，我們將為您安排製作。</p>
            <button @click="location.reload()" class="text-brandAccent font-bold">返回首頁</button>
        </div>
    </div>

    <!-- 管理後台 -->
    <div x-show="showAdmin" x-cloak class="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-black/90 backdrop-blur-md">
        <div class="bg-white p-8 rounded-[2rem] w-full max-w-xs text-center">
            <h3 class="font-serif font-bold text-2xl mb-6">管理後台</h3>
            <input type="password" x-model="adminPassword" placeholder="管理密碼" class="w-full bg-gray-50 rounded-xl p-4 mb-4 text-center outline-none">
            <button @click="toggleOrderStatus()" class="w-full py-4 bg-brandAccent text-white rounded-2xl font-bold mb-4 active-scale">切換接單開關</button>
            <button @click="showAdmin = false" class="text-gray-400 text-sm">關閉</button>
        </div>
    </div>

    <script>
        // 請在此填入您的 Google Apps Script 網址
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxL1ehkro8AOL54SNv4-HtcowjpgJTfknQp_jkFu7IimwGSZBhdg5WSExppD4SEGu8v/exec';

        document.addEventListener('alpine:init', () => {
            Alpine.data('cookieShop', () => ({
                isOrderOpen: true,
                products: [
                    { id: 1, name: '百里香酵母餅乾', price: 135, weight: '150g', description: '百里香木質調的氣息清爽而有個性，帶有一絲薄荷的醍醐感...', ingredients: '天然酵母、中筋麵粉、海鹽、奶油、乾燥百里香、葵花油' },
                    { id: 2, name: '芝麻酵母餅乾', price: 135, weight: '150g', description: '黑芝麻台灣人很熟悉，咬下的每一口化開的油香...', ingredients: '天然酵母、中筋麵粉、海鹽、奶油、熟芝麻、葵花油' }
                ],
                cart: [],
                showCart: false,
                step: 1,
                submitting: false,
                showAdmin: false,
                adminPassword: '',
                formData: { customer_name: '', ig_account: '', phone: '', seven_eleven_store: '' },

                init() {
                    this.fetchRemoteData();
                },

                async fetchRemoteData() {
                    if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes('YOUR_GOOGLE')) return;
                    try {
                        const res = await fetch(GOOGLE_SCRIPT_URL);
                        const data = await res.json();
                        if (data.products && data.products.length > 0) this.products = data.products;
                        if (data.config && data.config.isOrderOpen !== undefined) {
                            this.isOrderOpen = String(data.config.isOrderOpen) === 'true';
                        }
                    } catch (e) { console.error("遠端抓取失敗"); }
                },

                getImage(product) {
                    if (product.mainImg && product.mainImg.startsWith('http')) return product.mainImg;
                    const fallbacks = {
                        1: 'https://images.unsplash.com/photo-1558961363-fa8fdf82db35?auto=format&fit=crop&q=80&w=600',
                        2: 'https://images.unsplash.com/photo-1590080874088-eec64895b423?auto=format&fit=crop&q=80&w=600'
                    };
                    return fallbacks[product.id] || fallbacks[1];
                },

                getItemCount(id) {
                    const item = this.cart.find(i => i.id == id);
                    return item ? item.qty : 0;
                },

                addToCart(product) {
                    if (!this.isOrderOpen) return;
                    this.cart.push({ ...product, qty: 1 });
                },

                updateQty(id, delta) {
                    const item = this.cart.find(i => i.id == id);
                    if (item) {
                        item.qty += delta;
                        if (item.qty <= 0) this.cart = this.cart.filter(i => i.id != id);
                    }
                },

                get cartCount() { return this.cart.reduce((sum, i) => sum + i.qty, 0); },
                get subtotal() { return this.cart.reduce((sum, i) => sum + (i.price * i.qty), 0); },
                get total() { return this.subtotal > 0 ? this.subtotal + 60 : 0; },

                async submitOrder() {
                    this.submitting = true;
                    try {
                        if (GOOGLE_SCRIPT_URL && !GOOGLE_SCRIPT_URL.includes('YOUR_GOOGLE')) {
                            await fetch(GOOGLE_SCRIPT_URL, {
                                method: 'POST',
                                body: JSON.stringify({ action: 'submitOrder', ...this.formData, cart: this.cart, total: this.total })
                            });
                        }
                        this.step = 3;
                        this.cart = [];
                    } catch (e) { alert('提交失敗'); } finally { this.submitting = false; }
                },

                async toggleOrderStatus() {
                    const newValue = !this.isOrderOpen;
                    try {
                        if (GOOGLE_SCRIPT_URL && !GOOGLE_SCRIPT_URL.includes('YOUR_GOOGLE')) {
                            const res = await fetch(GOOGLE_SCRIPT_URL, {
                                method: 'POST',
                                body: JSON.stringify({ action: 'toggleOrder', password: this.adminPassword, value: newValue })
                            });
                            const result = await res.json();
                            if (result.status !== 'success') throw new Error(result.message);
                        }
                        this.isOrderOpen = newValue;
                        this.showAdmin = false;
                        this.adminPassword = '';
                    } catch (e) { alert(e.message || '操作失敗'); }
                }
            }));
        });
    </script>
</body>
</html>
