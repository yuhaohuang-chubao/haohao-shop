<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>豪豪出包 Sourdough</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#14110F', secondary: '#34312D', graytext: '#7E7F83',
                        sand: '#D9C5B2', bglight: '#F3F3F4',
                        accent1: '#B37BA4', accent2: '#D99AC5', accent3: '#DCCDE8',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { border-radius: 0 !important; font-family: 'Noto Sans TC', sans-serif; }
        body { background-color: #ffffff; color: #14110F; -webkit-font-smoothing: antialiased; }
        .product-img { aspect-ratio: 3/2; object-fit: cover; width: 100%; background: #F3F3F4; }
        .fade-in { animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .loader { border: 2px solid #F3F3F4; border-top: 2px solid #14110F; border-radius: 50% !important; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-20 md:pb-0">

    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-sm border-b border-gray-100 h-20">
        <div class="max-w-6xl mx-auto px-6 h-full flex items-center justify-between relative">
            <div id="siteName" class="text-xs font-bold tracking-[0.2em] text-primary uppercase">豪豪出包</div>
            <div class="absolute left-1/2 -translate-x-1/2">
                <img id="siteLogo" src="" alt="Logo" class="h-10 w-auto hidden">
            </div>
            <button onclick="app.navigate('checkout')" class="relative p-2">
                <i class="fa-solid fa-cart-shopping text-lg"></i>
                <span id="cartBadge" class="absolute -top-1 -right-1 bg-accent1 text-white text-[9px] w-4 h-4 flex items-center justify-center hidden">0</span>
            </button>
        </div>
    </nav>

    <main id="app">
        <div id="loadingView" class="min-h-[60vh] flex flex-col items-center justify-center text-graytext">
            <div class="loader mb-4"></div>
            <p class="text-[10px] tracking-[0.3em] uppercase">Loading Artisanal Sourdough</p>
        </div>

        <div id="homeView" class="hidden fade-in">
            <img id="heroImg" src="" alt="Hero" class="w-full h-[50vh] md:h-[75vh] object-cover">
            
            <section class="max-w-3xl mx-auto px-6 py-20">
                <div id="orderInstructions" class="text-sm md:text-base leading-relaxed text-secondary whitespace-pre-line border-l border-sand pl-8"></div>
            </section>

            <section id="productsContainer" class="max-w-4xl mx-auto px-6 space-y-32 mb-40"></section>

            <section class="bg-bglight py-24 px-6">
                <div class="max-w-2xl mx-auto">
                    <div class="mb-16">
                        <span class="text-[10px] font-bold text-graytext tracking-[0.4em] uppercase block mb-6">About Our Studio</span>
                        <h2 id="brandDescription" class="text-2xl md:text-3xl font-light leading-snug text-primary whitespace-pre-line"></h2>
                    </div>
                    <div class="w-16 h-[1px] bg-sand mb-16"></div>
                    <div>
                        <span class="text-[10px] font-bold text-graytext tracking-[0.4em] uppercase block mb-6">Our Philosophy</span>
                        <div id="brandStatement" class="text-sm md:text-base leading-loose text-secondary whitespace-pre-line"></div>
                    </div>
                </div>
            </section>
        </div>

        <div id="checkoutView" class="hidden fade-in max-w-2xl mx-auto px-6 py-20">
            <h2 class="text-xl font-bold tracking-[0.2em] mb-12 border-b pb-6">ORDER CONFIRMATION</h2>
            <div id="cartItems" class="space-y-6 mb-12 border-b pb-12"></div>
            <div class="flex justify-between items-center text-xl font-bold mb-12">
                <span>TOTAL</span>
                <span id="totalPrice" class="text-accent1">NT$ 0</span>
            </div>
            
            <form onsubmit="event.preventDefault(); app.submitOrder();" class="space-y-8">
                <input type="text" id="name" placeholder="中文姓名" required class="w-full border-b py-4 outline-none focus:border-sand">
                <input type="text" id="ig" placeholder="Instagram 帳號" required class="w-full border-b py-4 outline-none focus:border-sand">
                <input type="tel" id="phone" placeholder="聯絡手機" required class="w-full border-b py-4 outline-none focus:border-sand">
                <input type="email" id="email" placeholder="Email" required class="w-full border-b py-4 outline-none focus:border-sand">
                <input type="text" id="store" placeholder="7-11 門市名稱與店號" required class="w-full border-b py-4 outline-none focus:border-sand">
                <div class="pt-10 flex gap-4">
                    <button type="submit" id="submitBtn" class="flex-1 bg-primary text-white py-5 font-bold tracking-widest hover:bg-secondary">SEND ORDER</button>
                    <button type="button" onclick="app.navigate('home')" class="px-8 text-xs text-graytext uppercase tracking-widest">Back</button>
                </div>
            </form>
        </div>

        <div id="successView" class="hidden fade-in max-w-xl mx-auto px-6 py-32 text-center">
            <i class="fa-solid fa-circle-check text-5xl text-accent1 mb-8"></i>
            <h2 class="text-2xl font-light mb-2">訂單已成功送出</h2>
            <p id="orderIdDisplay" class="text-xs text-graytext mb-12"></p>
            <div class="bg-bglight p-10 text-left space-y-6">
                <div>
                    <p class="text-[10px] font-bold text-graytext tracking-widest uppercase mb-2">匯款帳號</p>
                    <div class="flex justify-between items-center border-b border-sand/30 pb-2">
                        <span id="bankAccount" class="text-lg"></span>
                        <button onclick="app.copyText('bankAccount')" class="text-sand"><i class="fa-regular fa-copy"></i></button>
                    </div>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-graytext tracking-widest uppercase mb-2">轉帳提醒</p>
                    <p id="bankReminder" class="text-xs text-secondary leading-loose whitespace-pre-line"></p>
                </div>
            </div>
            <button onclick="window.location.reload()" class="mt-16 text-xs underline text-graytext uppercase tracking-widest">Back to Home</button>
        </div>
    </main>

    <footer class="py-20 px-6 border-t border-gray-50">
        <div class="max-w-4xl mx-auto text-center">
            <p id="footerContent" class="text-xs text-graytext leading-loose whitespace-pre-line mb-8"></p>
            <p class="text-[9px] text-gray-300 tracking-[0.3em] uppercase">&copy; 2026 HaoHao ChuBao Studio</p>
        </div>
    </footer>

    <div id="mobileBar" class="fixed bottom-0 left-0 w-full bg-primary text-white p-6 flex justify-between items-center md:hidden z-40 hidden" onclick="app.navigate('checkout')">
        <span class="text-xs font-bold tracking-widest">CHECKOUT NOW</span>
        <span id="barTotal" class="font-bold"></span>
    </div>

    <script>
        /** * ⚠️ 重要：請在此貼上你的 GAS URL 
         */
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw8pc2DUZNLCNA4jBVPsCBvFtBmikvb_FWfFPygl_OUbfS4EXPoZhR7hW2PpNb1KlQSyA/exec";

        const app = {
            state: { products: [], settings: {}, cart: {} },
            async init() {
                try {
                    const res = await fetch(GAS_URL + "?action=getData").then(r => r.json());
                    this.state.products = res.data.products;
                    this.state.settings = res.data.settings;
                    this.renderSettings();
                    this.renderProducts();
                    this.navigate('home');
                } catch (e) { console.error("Load failed"); }
            },
            navigate(page) {
                document.querySelectorAll('#app > div').forEach(d => d.classList.add('hidden'));
                document.getElementById(page + 'View').classList.remove('hidden');
                window.scrollTo(0,0);
                this.updateUI();
            },
            renderSettings() {
                const s = this.state.settings;
                document.getElementById('siteName').innerText = s.site_name;
                if(s.logo_url) { const l = document.getElementById('siteLogo'); l.src = s.logo_url; l.classList.remove('hidden'); }
                document.getElementById('heroImg').src = s.hero_image_url;
                document.getElementById('orderInstructions').innerText = s.order_instructions;
                document.getElementById('brandDescription').innerText = s.brand_description;
                document.getElementById('brandStatement').innerText = s.brand_statement;
                document.getElementById('footerContent').innerText = s.footer_content;
                document.getElementById('bankAccount').innerText = s.bank_account;
                document.getElementById('bankReminder').innerText = s.bank_reminder;
            },
            renderProducts() {
                const container = document.getElementById('productsContainer');
                this.state.products.filter(p => String(p.is_visible).toUpperCase() === 'TRUE').forEach(p => {
                    const html = `
                        <div class="flex flex-col gap-10">
                            <img src="${p.main_image_url}" class="product-img">
                            <div>
                                <h3 class="text-3xl font-bold mb-2">${p.name}</h3>
                                <p class="text-sm font-medium text-sand tracking-[0.2em] mb-8 uppercase">${p.weight_grams}G <span class="mx-3 text-gray-200">|</span> NT$ ${p.price}</p>
                                <div class="text-lg md:text-xl text-secondary leading-relaxed mb-12 font-light whitespace-pre-line">${p.description}</div>
                                <div class="flex items-center gap-8">
                                    <div class="flex items-center border border-gray-200 h-14">
                                        <button onclick="app.qty(${p.id},-1)" class="w-14 h-full flex items-center justify-center text-graytext"><i class="fa-solid fa-minus"></i></button>
                                        <span id="qty-${p.id}" class="w-12 text-center font-bold">0</span>
                                        <button onclick="app.qty(${p.id},1)" class="w-14 h-full flex items-center justify-center text-graytext"><i class="fa-solid fa-plus"></i></button>
                                    </div>
                                    <span class="text-xs font-bold text-accent1 tracking-widest">每人限購 ${p.max_quantity} 包</span>
                                </div>
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', html);
                });
            },
            qty(id, delta) {
                const p = this.state.products.find(x => x.id == id);
                let current = this.state.cart[id] || 0;
                let next = current + delta;
                if(next >= 0 && next <= p.max_quantity) {
                    this.state.cart[id] = next;
                    document.getElementById(`qty-${id}`).innerText = next;
                    this.updateUI();
                }
            },
            updateUI() {
                let total = 0, count = 0;
                this.state.products.forEach(p => {
                    const q = this.state.cart[p.id] || 0;
                    total += q * p.price; count += q;
                });
                document.getElementById('cartBadge').innerText = count;
                document.getElementById('cartBadge').classList.toggle('hidden', count === 0);
                document.getElementById('mobileBar').classList.toggle('hidden', count === 0 || document.getElementById('checkoutView').classList.contains('hidden') === false);
                document.getElementById('barTotal').innerText = 'NT$ ' + (total + 60);
                document.getElementById('totalPrice').innerText = 'NT$ ' + (total + 60);
                
                // 渲染結帳清單
                const list = document.getElementById('cartItems');
                if(list) {
                    list.innerHTML = '';
                    this.state.products.forEach(p => {
                        const q = this.state.cart[p.id] || 0;
                        if(q > 0) list.insertAdjacentHTML('beforeend', `<div class="flex justify-between"><span>${p.name} x ${q}</span><span>NT$ ${p.price * q}</span></div>`);
                    });
                    list.insertAdjacentHTML('beforeend', `<div class="flex justify-between text-graytext text-sm"><span>7-11 運費</span><span>NT$ 60</span></div>`);
                }
            },
            async submitOrder() {
                const btn = document.getElementById('submitBtn');
                btn.disabled = true; btn.innerText = "SENDING...";
                const orderData = {
                    customer_name: document.getElementById('name').value,
                    ig_account: document.getElementById('ig').value,
                    phone: document.getElementById('phone').value,
                    email: document.getElementById('email').value,
                    cvs_store_name: document.getElementById('store').value,
                    items_json: JSON.stringify(this.state.cart),
                    subtotal: 0, shipping_fee: 60, total_price: 0 // GAS 會重新計算，這裡傳簡單數值
                };
                try {
                    const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(orderData) }).then(r => r.json());
                    document.getElementById('orderIdDisplay').innerText = "ORDER ID: " + res.order_id;
                    this.navigate('success');
                } catch(e) { alert("提交失敗"); btn.disabled = false; btn.innerText = "RETRY"; }
            },
            copyText(id) {
                const t = document.getElementById(id).innerText;
                navigator.clipboard.writeText(t); alert("已複製匯款帳號");
            }
        };
        app.init();
    </script>
</body>
</html>
