<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sourdough Cracker 訂購網</title>
    
    <!-- 引入字體 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- 引入圖示 -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#14110F',
                            grayDark: '#34312D',
                            grayLight: '#7E7F83',
                            primary: '#DDC9B4',
                            primaryDark: '#BCAC9B',
                            accent: '#7A6C5D',
                            bg: '#F3F3F4',
                            highlight1: '#2A3D45',
                            highlight2: '#C17C74',
                        }
                    },
                    fontFamily: {
                        sans: ['"Noto Sans TC"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- 引入 Alpine.js -->
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { background-color: #E5E5E5; -webkit-tap-highlight-color: transparent; }
        [x-cloak] { display: none !important; }
        
        /* Loading 動畫 */
        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid #DDC9B4;
            border-bottom-color: #2A3D45;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="text-brand-dark antialiased font-sans flex justify-center">

    <!-- 手機版框架 -->
    <div class="w-full max-w-md min-h-screen bg-brand-bg relative shadow-2xl overflow-hidden flex flex-col" x-data="shopApp()">
        
        <!-- ====== 載入中畫面 ====== -->
        <div x-show="isLoading" 
             x-transition.opacity.duration.500ms
             class="absolute inset-0 z-50 bg-brand-bg flex flex-col items-center justify-center space-y-4" x-cloak>
             <span class="loader"></span>
             <p class="text-brand-highlight1 font-bold tracking-widest animate-pulse">載入最新商品中...</p>
        </div>

        <!-- ====== 錯誤畫面 (若讀取失敗) ====== -->
        <div x-show="!isLoading && isError" 
             class="absolute inset-0 z-50 bg-brand-bg flex flex-col items-center justify-center p-6 text-center space-y-4" x-cloak>
             <i data-lucide="alert-triangle" class="w-16 h-16 text-brand-highlight2"></i>
             <h2 class="text-xl font-bold">哎呀！讀取資料失敗</h2>
             <p class="text-brand-grayDark text-sm">請檢查您的網路連線，或重新整理頁面試試看。</p>
             <button @click="fetchStoreData()" class="mt-4 bg-brand-highlight1 text-white px-6 py-2 rounded-xl">重試</button>
        </div>

        <!-- ====== 主要內容 (資料載入完成後顯示) ====== -->
        <template x-if="!isLoading && !isError">
            <div class="flex flex-col h-full w-full">
                
                <!-- Navbar -->
                <header class="bg-brand-bg/90 backdrop-blur-md sticky top-0 z-40 border-b border-brand-primaryDark/20">
                    <div class="flex items-center justify-between px-6 py-4">
                        <div class="cursor-pointer font-bold text-xl tracking-widest text-brand-dark flex items-center gap-2" @click="changeView('home')">
                            <!-- 如果後台有設定 Logo 圖片，則顯示圖片，否則顯示純文字 -->
                            <template x-if="settings.logo_image_url">
                                <img :src="settings.logo_image_url" class="h-8 w-auto object-contain" alt="Logo">
                            </template>
                            <span x-show="!settings.logo_image_url" x-text="settings.site_name || '豪豪出包'"></span>
                        </div>
                        
                        <button 
                            x-show="['home', 'shop', 'cart'].includes(currentView)"
                            @click="changeView('cart')" 
                            class="relative p-2 text-brand-highlight1 hover:text-brand-highlight2 transition-colors">
                            <i data-lucide="shopping-bag"></i>
                            <span 
                                x-show="cartTotalItems > 0" 
                                x-text="cartTotalItems"
                                class="absolute top-0 right-0 bg-brand-highlight2 text-white text-[10px] font-bold h-4 w-4 rounded-full flex items-center justify-center">
                            </span>
                        </button>
                    </div>
                </header>

                <main class="flex-1 overflow-y-auto no-scrollbar pb-24 relative">
                    
                    <!-- ====== 視圖 1: 首頁 (Home) ====== -->
                    <div x-show="currentView === 'home'" 
                         x-transition:enter="transition ease-out duration-500"
                         x-transition:enter-start="opacity-0 translate-y-4"
                         x-transition:enter-end="opacity-100 translate-y-0"
                         class="space-y-8 pb-6" x-cloak>
                        
                        <!-- 動態主視覺大圖 -->
                        <div class="w-full aspect-[4/3] bg-brand-primary/20 relative">
                            <img :src="settings.main_image_url || 'https://images.unsplash.com/photo-1558961363-fa8fdf82db35?auto=format&fit=crop&q=80&w=800'" 
                                 class="w-full h-full object-cover" 
                                 alt="主視覺">
                        </div>

                        <div class="px-6 space-y-10">
                            <!-- 品牌視覺文字 -->
                            <div class="text-center space-y-4">
                                <h1 class="text-2xl font-bold tracking-widest text-brand-highlight1" style="white-space: pre-line" x-text="settings.brand_description"></h1>
                            </div>

                            <!-- 品牌理念 -->
                            <div class="bg-white p-6 rounded-2xl shadow-sm border border-brand-primary/30 relative">
                                <div class="absolute -top-3 left-6 bg-brand-primary px-3 py-1 rounded-full text-xs font-bold text-brand-highlight1">品牌理念</div>
                                <p class="text-sm leading-relaxed text-brand-grayDark mt-2" style="white-space: pre-line" x-text="settings.brand_statement"></p>
                            </div>

                            <!-- 訂購須知 -->
                            <div class="space-y-3">
                                <h2 class="text-lg font-bold border-l-4 border-brand-highlight2 pl-3">訂購須知</h2>
                                <div class="bg-brand-primary/10 p-5 rounded-2xl text-sm leading-relaxed text-brand-grayDark" style="white-space: pre-line" x-text="settings.order_instructions"></div>
                            </div>

                            <!-- CTA 按鈕 -->
                            <button @click="changeView('shop')" class="w-full bg-brand-highlight1 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-opacity-90 transition-all active:scale-95 flex justify-center items-center gap-2">
                                開始選購 <i data-lucide="arrow-right" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>


                    <!-- ====== 視圖 2: 商品頁 (Shop) ====== -->
                    <div x-show="currentView === 'shop'" 
                         x-transition:enter="transition ease-out duration-500"
                         x-transition:enter-start="opacity-0 translate-y-4"
                         x-transition:enter-end="opacity-100 translate-y-0"
                         class="p-6 space-y-8" x-cloak>
                        
                        <h2 class="text-2xl font-bold mb-6">產品選購</h2>

                        <!-- 檢查是否有商品 -->
                        <div x-show="products.length === 0" class="text-center py-10 text-brand-grayLight">
                            <p>目前還沒有商品上架喔！</p>
                        </div>

                        <template x-for="product in products" :key="product.id">
                            <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-brand-primary/30 flex flex-col">
                                <!-- 動態商品圖片 -->
                                <div class="h-48 bg-brand-primary/20 w-full relative">
                                    <img :src="product.main_image_url || 'https://images.unsplash.com/photo-1558961363-fa8fdf82db35?auto=format&fit=crop&q=80&w=600'" 
                                         class="w-full h-full object-cover">
                                    <div x-show="product.max_quantity <= 0" class="absolute inset-0 bg-black/50 flex items-center justify-center backdrop-blur-sm">
                                        <span class="text-white font-bold tracking-widest border-2 border-white px-4 py-2 rounded-lg">已售完</span>
                                    </div>
                                </div>
                                
                                <div class="p-5 space-y-4">
                                    <div class="flex justify-between items-start">
                                        <div>
                                            <h3 class="text-lg font-bold" x-text="product.name"></h3>
                                            <p class="text-xs text-brand-grayLight mt-1" x-text="`重量: ${product.weight_grams}g`"></p>
                                        </div>
                                        <div class="text-brand-highlight2 font-bold text-lg" x-text="`NT$ ${product.price}`"></div>
                                    </div>
                                    
                                    <p class="text-sm text-brand-grayDark leading-relaxed" style="white-space: pre-line" x-text="product.description"></p>
                                    
                                    <div class="text-xs text-brand-grayLight bg-brand-bg p-3 rounded-lg">
                                        <span class="font-bold">成分：</span><span x-text="product.ingredients"></span>
                                    </div>

                                    <!-- 加入購物車控制 -->
                                    <div class="pt-4 border-t border-brand-bg flex items-center justify-between" x-show="product.max_quantity > 0">
                                        <div class="text-sm text-brand-accent">
                                            <span x-text="`每人限購 ${product.max_quantity} 份`"></span>
                                        </div>
                                        
                                        <div class="flex items-center gap-3 bg-brand-bg rounded-lg p-1">
                                            <button @click="removeFromCart(product)" class="w-8 h-8 flex items-center justify-center text-brand-highlight1 bg-white rounded-md shadow-sm active:scale-95 disabled:opacity-50" :disabled="getCartQuantity(product.id) === 0">
                                                <i data-lucide="minus" class="w-4 h-4"></i>
                                            </button>
                                            <span class="w-4 text-center font-bold" x-text="getCartQuantity(product.id)"></span>
                                            <button @click="addToCart(product)" class="w-8 h-8 flex items-center justify-center text-white bg-brand-highlight1 rounded-md shadow-sm active:scale-95 disabled:opacity-50" :disabled="getCartQuantity(product.id) >= product.max_quantity">
                                                <i data-lucide="plus" class="w-4 h-4"></i>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>

                    <!-- ====== 視圖 3: 購物車 (Cart) ====== -->
                    <div x-show="currentView === 'cart'" class="p-6 space-y-6" x-cloak>
                        <!-- (同前一版邏輯，省略部分重複內容以保持簡潔，直接延續) -->
                        <div class="flex items-center gap-3 mb-6">
                            <button @click="changeView('shop')" class="text-brand-grayLight hover:text-brand-dark"><i data-lucide="arrow-left"></i></button>
                            <h2 class="text-2xl font-bold">購物車</h2>
                        </div>

                        <template x-if="cart.length === 0">
                            <div class="text-center py-20 text-brand-grayLight space-y-4">
                                <i data-lucide="shopping-cart" class="w-16 h-16 mx-auto opacity-50"></i>
                                <p>購物車是空的喔！</p>
                                <button @click="changeView('shop')" class="px-6 py-2 bg-brand-primary text-brand-dark rounded-full text-sm font-bold">去逛逛</button>
                            </div>
                        </template>

                        <template x-if="cart.length > 0">
                            <div class="space-y-6">
                                <div class="space-y-4">
                                    <template x-for="item in cart" :key="item.id">
                                        <div class="bg-white p-4 rounded-xl flex items-center justify-between shadow-sm border border-brand-primary/20">
                                            <div class="flex-1">
                                                <h4 class="font-bold text-sm" x-text="item.name"></h4>
                                                <div class="text-brand-highlight2 text-sm mt-1" x-text="`NT$ ${item.price}`"></div>
                                            </div>
                                            <div class="flex items-center gap-3 bg-brand-bg rounded-lg p-1">
                                                <button @click="removeFromCart(item)" class="w-7 h-7 flex items-center justify-center text-brand-highlight1 bg-white rounded-md shadow-sm active:scale-95">
                                                    <i data-lucide="minus" class="w-4 h-4"></i>
                                                </button>
                                                <span class="w-4 text-center font-bold text-sm" x-text="item.quantity"></span>
                                                <button @click="addToCart(item)" class="w-7 h-7 flex items-center justify-center text-white bg-brand-highlight1 rounded-md shadow-sm active:scale-95 disabled:opacity-50" :disabled="item.quantity >= item.max_quantity">
                                                    <i data-lucide="plus" class="w-4 h-4"></i>
                                                </button>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                                <div class="bg-brand-primaryDark/10 p-5 rounded-xl space-y-3 text-sm">
                                    <div class="flex justify-between">
                                        <span class="text-brand-grayDark">商品小計</span>
                                        <span class="font-bold" x-text="`NT$ ${cartSubtotal}`"></span>
                                    </div>
                                    <div class="flex justify-between">
                                        <span class="text-brand-grayDark" x-text="`運費 (${settings.shipping_method || '常溫交貨便'})`"></span>
                                        <span class="font-bold" x-text="`NT$ ${settings.shipping_fee || 0}`"></span>
                                    </div>
                                    <div class="border-t border-brand-primary/30 pt-3 flex justify-between items-center mt-2">
                                        <span class="font-bold text-base">總計</span>
                                        <span class="font-bold text-xl text-brand-highlight2" x-text="`NT$ ${cartSubtotal + parseInt(settings.shipping_fee || 0)}`"></span>
                                    </div>
                                </div>
                                <button @click="changeView('checkout')" class="w-full bg-brand-highlight1 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-opacity-90 transition-all active:scale-95">
                                    下一步：填寫資料
                                </button>
                            </div>
                        </template>
                    </div>

                    <!-- ====== 視圖 4: 結帳表單 (Checkout) ====== -->
                    <div x-show="currentView === 'checkout'" class="p-6 space-y-6" x-cloak>
                        <div class="flex items-center gap-3 mb-4">
                            <button @click="changeView('cart')" class="text-brand-grayLight hover:text-brand-dark"><i data-lucide="arrow-left"></i></button>
                            <h2 class="text-2xl font-bold">寄送資料</h2>
                        </div>
                        <form @submit.prevent="submitOrder" class="space-y-5">
                            <div>
                                <label class="block text-sm font-bold mb-2">真實姓名 (中文)</label>
                                <input type="text" x-model="formData.name" required class="w-full bg-white border border-brand-primaryDark/30 rounded-xl px-4 py-3 focus:outline-none focus:border-brand-highlight1">
                            </div>
                            <div>
                                <label class="block text-sm font-bold mb-2">手機號碼</label>
                                <input type="tel" x-model="formData.phone" required pattern="09\d{8}" class="w-full bg-white border border-brand-primaryDark/30 rounded-xl px-4 py-3 focus:outline-none focus:border-brand-highlight1">
                            </div>
                            <div>
                                <label class="block text-sm font-bold mb-2">Instagram 帳號 <span class="text-brand-grayLight font-normal text-xs">(選填)</span></label>
                                <input type="text" x-model="formData.ig" class="w-full bg-white border border-brand-primaryDark/30 rounded-xl px-4 py-3 focus:outline-none focus:border-brand-highlight1">
                            </div>
                            <div class="pt-4 border-t border-brand-primaryDark/20">
                                <label class="block text-sm font-bold mb-2">7-11 取件門市名稱</label>
                                <input type="text" x-model="formData.cvs_store_name" required class="w-full bg-white border border-brand-primaryDark/30 rounded-xl px-4 py-3 focus:outline-none focus:border-brand-highlight1">
                            </div>
                            <div>
                                <label class="block text-sm font-bold mb-2">7-11 店號 <span class="text-brand-grayLight font-normal text-xs">(6碼數字)</span></label>
                                <input type="text" x-model="formData.cvs_store_number" required pattern="\d{6}" class="w-full bg-white border border-brand-primaryDark/30 rounded-xl px-4 py-3 focus:outline-none focus:border-brand-highlight1">
                            </div>
                            <div class="pt-6">
                                <button type="submit" class="w-full bg-brand-highlight1 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-opacity-90 transition-all active:scale-95 flex justify-center items-center gap-2 disabled:opacity-70" :disabled="isSubmitting">
                                    <span x-show="!isSubmitting">確認送出訂單</span>
                                    <span x-show="isSubmitting" class="flex items-center gap-2">
                                        <i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> 處理中...
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>

                    <!-- ====== 視圖 5: 成功頁面 (Success) ====== -->
                    <div x-show="currentView === 'success'" class="p-6 space-y-8 text-center mt-10" x-cloak>
                        <div class="w-20 h-20 mx-auto bg-green-100 text-green-600 rounded-full flex items-center justify-center shadow-inner mb-6">
                            <i data-lucide="check" class="w-10 h-10"></i>
                        </div>
                        <h2 class="text-2xl font-bold">訂購成功！</h2>
                        <p class="text-brand-grayDark text-sm">感謝您的訂購。您的訂單已保留。</p>
                        <p class="text-xs text-brand-highlight2 font-bold" x-text="`訂單編號: #${orderId}`"></p>
                        
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-brand-primary/30 text-left space-y-4 mt-8">
                            <h3 class="font-bold border-b border-brand-bg pb-2">匯款資訊</h3>
                            <div>
                                <p class="text-xs text-brand-grayLight mb-1">匯款帳號</p>
                                <div class="flex items-center justify-between bg-brand-bg p-3 rounded-lg">
                                    <span class="font-bold font-mono tracking-wider" x-text="settings.bank_account"></span>
                                    <button @click="copyText(settings.bank_account)" class="text-brand-highlight1 text-sm bg-white px-2 py-1 rounded shadow-sm">複製</button>
                                </div>
                            </div>
                            <div>
                                <p class="text-xs text-brand-grayLight mb-1">應付總額</p>
                                <p class="font-bold text-xl text-brand-highlight2" x-text="`NT$ ${finalTotal}`"></p>
                            </div>
                            <div class="text-xs text-brand-grayDark leading-relaxed pt-2" style="white-space: pre-line" x-text="settings.bank_reminder"></div>
                        </div>
                        <div class="pt-8">
                            <button @click="resetApp()" class="text-brand-grayDark text-sm underline hover:text-brand-highlight1">返回首頁</button>
                        </div>
                    </div>
                </main>

                <!-- 浮動購物車提示 -->
                <div x-show="currentView === 'shop' && cartTotalItems > 0"
                     class="absolute bottom-0 left-0 right-0 p-4 bg-white border-t border-brand-primary/30 shadow-[0_-10px_20px_-10px_rgba(0,0,0,0.1)] z-50 flex items-center justify-between" x-cloak>
                     <div>
                         <p class="text-xs text-brand-grayLight mb-0.5">購物車共 <span x-text="cartTotalItems"></span> 件</p>
                         <p class="font-bold text-brand-highlight2" x-text="`NT$ ${cartSubtotal}`"></p>
                     </div>
                     <button @click="changeView('cart')" class="bg-brand-highlight1 text-white px-6 py-2.5 rounded-full font-bold text-sm shadow-md active:scale-95">
                         結帳去
                     </button>
                </div>
            </div>
        </template>
    </div>

    <script>
        // 【重要】請將下方替換為您完成步驟二後取得的 Google Apps Script 網址
        const GOOGLE_APP_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxbKkjvmtU-lCU5kbbn6ERLF9PUKiaIfin2jssMx6Erh3jSxfUy363pP7rWvHNCy4xnhA/exec';

        document.addEventListener('alpine:init', () => {
            Alpine.data('shopApp', () => ({
                isLoading: true,
                isError: false,
                currentView: 'home',
                isSubmitting: false,
                orderId: '',
                finalTotal: 0,
                
                settings: {},
                products: [],
                cart: [],
                formData: { name: '', phone: '', ig: '', cvs_store_name: '', cvs_store_number: '' },

                init() {
                    this.fetchStoreData();
                    
                    this.$watch('currentView', () => {
                        window.scrollTo(0, 0);
                        setTimeout(() => lucide.createIcons(), 50);
                    });
                },

                // ==== 1. 向 Google Sheet 抓取設定與產品資料 ====
                async fetchStoreData() {
                    this.isLoading = true;
                    this.isError = false;
                    
                    if(GOOGLE_APP_SCRIPT_URL === 'YOUR_GOOGLE_APP_SCRIPT_URL_HERE') {
                        // 如果還沒填入真實網址，給點假資料方便預覽設計
                        setTimeout(() => {
                            this.settings = { site_name: "豪豪出包 (預覽測試)", order_instructions: "請先綁定 Google Sheet API" };
                            this.products = [];
                            this.isLoading = false;
                            setTimeout(() => lucide.createIcons(), 50);
                        }, 1000);
                        return;
                    }

                    try {
                        // 使用 GET 方法呼叫 API
                        const response = await fetch(GOOGLE_APP_SCRIPT_URL);
                        const result = await response.json();
                        
                        if(result.status === 'success') {
                            this.settings = result.data.settings;
                            
                            // 過濾掉隱藏的商品並依照 sort_order 排序
                            let rawProducts = result.data.products;
                            this.products = rawProducts
                                .filter(p => p.is_visible === true || p.is_visible === 'TRUE')
                                .sort((a, b) => (a.sort_order || 99) - (b.sort_order || 99));
                            
                            this.isLoading = false;
                            setTimeout(() => lucide.createIcons(), 50);
                        } else {
                            throw new Error('Data format error');
                        }
                    } catch (error) {
                        console.error('Fetch error:', error);
                        this.isError = true;
                        this.isLoading = false;
                    }
                },

                // ==== 2. 將訂單送回 Google Sheet ====
                async submitOrder() {
                    if (this.cart.length === 0) return;
                    this.isSubmitting = true;

                    const shippingFee = parseInt(this.settings.shipping_fee || 0);

                    const orderPayload = {
                        created_at: new Date().toISOString(),
                        customer_name: this.formData.name,
                        ig_account: this.formData.ig,
                        phone: this.formData.phone,
                        cvs_store_name: this.formData.cvs_store_name,
                        cvs_store_number: this.formData.cvs_store_number,
                        items: JSON.stringify(this.cart.map(item => `${item.name}x${item.quantity}`).join(', ')),
                        subtotal: this.cartSubtotal,
                        shipping_fee: shippingFee,
                        total_price: this.cartSubtotal + shippingFee,
                        status: "new"
                    };

                    try {
                        const response = await fetch(GOOGLE_APP_SCRIPT_URL, {
                            method: 'POST',
                            mode: 'no-cors', // 重要：避免跨網域寫入被阻擋
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(orderPayload)
                        });
                        
                        // 產生前端顯示用的訂單編號
                        this.orderId = 'ORD' + Math.floor(1000 + Math.random() * 9000);
                        this.finalTotal = this.cartSubtotal + shippingFee;
                        
                        setTimeout(() => {
                            this.isSubmitting = false;
                            this.changeView('success');
                        }, 800);

                    } catch (error) {
                        alert('送出失敗，請檢查網路連線。');
                        this.isSubmitting = false;
                    }
                },

                // (保留原有的購物車邏輯)
                changeView(view) { this.currentView = view; },
                getCartQuantity(productId) { const i = this.cart.find(i => i.id === productId); return i ? i.quantity : 0; },
                addToCart(product) {
                    const existingItem = this.cart.find(i => i.id === product.id);
                    if (existingItem) { if (existingItem.quantity < product.max_quantity) existingItem.quantity++; } 
                    else { this.cart.push({ ...product, quantity: 1 }); }
                },
                removeFromCart(product) {
                    const index = this.cart.findIndex(i => i.id === product.id);
                    if (index !== -1) { if (this.cart[index].quantity > 1) this.cart[index].quantity--; else this.cart.splice(index, 1); }
                },
                get cartTotalItems() { return this.cart.reduce((total, item) => total + item.quantity, 0); },
                get cartSubtotal() { return this.cart.reduce((total, item) => total + (parseInt(item.price) * item.quantity), 0); },
                copyText(text) {
                    const tempInput = document.createElement("input");
                    tempInput.value = text;
                    document.body.appendChild(tempInput); tempInput.select(); document.execCommand("copy"); document.body.removeChild(tempInput);
                    alert('已複製帳號！');
                },
                resetApp() {
                    this.cart = [];
                    this.formData = { name: '', phone: '', ig: '', cvs_store_name: '', cvs_store_number: '' };
                    this.changeView('home');
                }
            }));
        });
    </script>
</body>
</html>
