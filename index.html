<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>豪豪出包 | Sourdough Cracker</title>
    
    <!-- 引入字體 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- 引入 React, ReactDOM, Babel, Tailwind, Framer Motion -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <!-- Tailwind 設定 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { DEFAULT: '#DDC9B4', dark: '#BCAC9B' },
                        accent: '#7A6C5D',
                        highlight: { DEFAULT: '#2A3D45', red: '#C17C74' },
                        cream: '#FDFBF9' // 極簡背景底色
                    },
                    fontFamily: {
                        sans: ['"Noto Sans TC"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #FDFBF9; color: #2A3D45; -webkit-tap-highlight-color: transparent; }
        /* 隱藏捲軸但保持可捲動 */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .whitespace-pre-line { white-space: pre-line; }
        .glass-nav { background: rgba(253, 251, 249, 0.85); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(221, 201, 180, 0.3); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = window.Motion;

        // ==========================================
        // 1. 設定區：請填入您的 Google Apps Script URL
        // ==========================================
        const API_URL = "https://script.google.com/macros/s/AKfycbz27imZO4YtNtD2s8CKJh5GiiVf_lk8iwwNMbK3pDRfoJE9DEAUdon_vpf6TQTJzdB43w/exec"; 
        
        // Mock 資料 (當 API_URL 未設定或載入失敗時的備用資料)
        const mockData = {
            settings: {
                site_name: "豪豪出包",
                logo_image_url: "https://duk.tw/hMyFFB.svg",
                main_image_url: "https://duk.tw/tNbPxp.jpg",
                brand_description: "Sourdough Cracker\n酸種酵母餅乾\nArtisan Snacks",
                brand_statement: "酵母餅乾成分很簡單，核心元素就是酸種酵母。\n\n酸種酵母不是商業用的速發酵母粉，他是利用麵粉和水，經過長時間培養而來的。而酵母裡的乳酸菌會產生天然的酸香風味，成為酵母餅乾最核心的味道來源。\n\n製作餅乾前酵母會先冷藏，讓乳酸的味道變得比較濃厚。這樣一來搭配不同香料，酸感和香氣就會更加平衡，咀嚼起來也會更有層次。",
                order_instructions: "2026年3月，酵母餅乾IG快閃試賣。\n全手工小量生產，謝謝支持與耐心等待，希望大家會喜歡！\n\n開放預訂：3/21 下午4:00\n截止預訂：3/22 上午11:00\n預計3/27陸續出貨\n\n(1) 全手工製作，餅乾形狀、大小和烤色不會全都一致\n(2) 本次訂單一律以「7-ELEVEN 常溫交貨便」寄送\n(3) 訂購時請確認中文姓名、手機和門市名稱已填寫正確\n(4) 如果你不確定訂單或匯款是否完成，請私訊IG",
                shipping_fee: "60",
                shipping_method: "7-11常溫交貨便"
            },
            products: [
                { id: 1, name: "百里香酵母餅乾", price: 135, weight_grams: 150, description: "廚房西式香料的常備品，百里香木質調的氣息清爽而有個性...\n和餅乾麵團混合烘烤之後，百里香的香氣不會搶戲。隱約在麥香與堅果微焦香氣之下，好像淡淡的一股草地味。", ingredients: "天然酵母、中筋麵粉、海鹽、奶油、乾燥百里香、葵花油", main_image_url: "https://duk.tw/U7Fmfo.jpg", max_quantity: 3 },
                { id: 2, name: "芝麻酵母餅乾", price: 135, weight_grams: 150, description: "黑芝麻台灣人很熟悉，即使放在酵母餅乾裡，我們還是認得。先是香氣，再來是在嘴裡咬一咬化開的油香，就已經讓人有默契地點點頭了！", ingredients: "天然酵母、中筋麵粉、海鹽、奶油、熟芝麻、葵花油", main_image_url: "https://duk.tw/PMFyh6.jpg", max_quantity: 3 }
            ]
        };

        // ==========================================
        // 2. SVG Icons
        // ==========================================
        const Icons = {
            Cart: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>,
            ArrowLeft: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>,
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>,
            Minus: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
        };

        // ==========================================
        // 3. 頁面元件
        // ==========================================

        // --- 導覽列 ---
        const Navbar = ({ cartCount, onNavigate, logoUrl }) => (
            <div className="fixed top-0 left-0 right-0 z-50 glass-nav px-6 py-4 flex justify-between items-center">
                <div className="flex items-center cursor-pointer" onClick={() => onNavigate('home')}>
                    {logoUrl ? <img src={logoUrl} alt="Logo" className="h-8" /> : <span className="font-bold tracking-widest text-lg">豪豪出包</span>}
                </div>
                <div className="relative cursor-pointer p-2" onClick={() => onNavigate('cart')}>
                    <Icons.Cart />
                    {cartCount > 0 && (
                        <span className="absolute top-0 right-0 bg-highlight-red text-white text-[10px] font-bold h-4 w-4 rounded-full flex items-center justify-center">
                            {cartCount}
                        </span>
                    )}
                </div>
            </div>
        );

        // --- 首頁 ---
        const HomeView = ({ settings, onNavigate }) => (
            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="pt-24 pb-20 px-6 max-w-lg mx-auto">
                {/* 視覺圖 */}
                <motion.div initial={{ y: 20, opacity: 0 }} animate={{ y: 0, opacity: 1 }} transition={{ delay: 0.1 }}>
                    {settings.main_image_url ? (
                        <img src={settings.main_image_url} alt="Main Visual" className="w-full h-[60vh] object-cover rounded-[2rem] shadow-sm mb-12" />
                    ) : (
                        <div className="w-full h-[60vh] bg-primary-dark rounded-[2rem] mb-12 flex items-center justify-center text-white">Main Image</div>
                    )}
                </motion.div>

                {/* 品牌理念 */}
                <motion.div initial={{ y: 20, opacity: 0 }} animate={{ y: 0, opacity: 1 }} transition={{ delay: 0.2 }} className="text-center mb-16">
                    <h1 className="text-2xl font-bold tracking-widest text-highlight mb-4 whitespace-pre-line">{settings.brand_description}</h1>
                    <p className="text-accent text-sm leading-relaxed whitespace-pre-line text-left mt-8">{settings.brand_statement}</p>
                </motion.div>

                {/* 購買須知 */}
                <motion.div initial={{ y: 20, opacity: 0 }} animate={{ y: 0, opacity: 1 }} transition={{ delay: 0.3 }} className="bg-primary bg-opacity-20 p-6 rounded-2xl mb-12 text-sm text-highlight leading-relaxed whitespace-pre-line">
                    <h3 className="font-bold mb-3 text-base">🛒 訂購須知</h3>
                    {settings.order_instructions}
                </motion.div>

                <motion.button 
                    whileHover={{ scale: 1.02 }} whileTap={{ scale: 0.98 }}
                    onClick={() => onNavigate('products')}
                    className="w-full bg-highlight text-white py-4 rounded-full font-bold tracking-widest shadow-md hover:bg-highlight-dark transition-colors">
                    開始訂購
                </motion.button>
            </motion.div>
        );

        // --- 產品列表頁 ---
        const ProductsView = ({ products, onNavigate }) => (
            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="pt-24 pb-24 px-6 max-w-lg mx-auto">
                <h2 className="text-xl font-bold tracking-widest mb-8 text-center">產品列表</h2>
                <div className="grid grid-cols-2 gap-4">
                    {products.map((product, idx) => (
                        <motion.div 
                            key={product.id}
                            initial={{ y: 20, opacity: 0 }} animate={{ y: 0, opacity: 1 }} transition={{ delay: idx * 0.1 }}
                            onClick={() => onNavigate('productDetail', product.id)}
                            className="cursor-pointer group flex flex-col"
                        >
                            <div className="aspect-square bg-primary-dark rounded-2xl overflow-hidden mb-3 relative">
                                {product.main_image_url ? (
                                    <img src={product.main_image_url} alt={product.name} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                                ) : (
                                    <div className="w-full h-full flex items-center justify-center text-white text-xs">No Image</div>
                                )}
                            </div>
                            <h3 className="font-bold text-sm text-highlight">{product.name}</h3>
                            <p className="text-accent text-xs mt-1">NT$ {product.price}</p>
                        </motion.div>
                    ))}
                </div>
            </motion.div>
        );

        // --- 產品詳細頁 ---
        const ProductDetailView = ({ product, onNavigate, onAddToCart }) => {
            const [quantity, setQuantity] = useState(1);
            const maxQ = parseInt(product.max_quantity) || 5;

            const handleAdd = () => {
                onAddToCart({ ...product, quantity });
                onNavigate('cart');
            };

            return (
                <motion.div initial={{ opacity: 0, x: 20 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: -20 }} className="pt-20 pb-32 px-6 max-w-lg mx-auto">
                    <button onClick={() => onNavigate('products')} className="flex items-center text-accent mb-6 hover:text-highlight">
                        <Icons.ArrowLeft /> <span className="ml-2 text-sm font-medium">返回列表</span>
                    </button>

                    <div className="w-full aspect-[4/5] bg-primary-dark rounded-[2rem] overflow-hidden mb-8 shadow-sm">
                        {product.main_image_url && <img src={product.main_image_url} alt={product.name} className="w-full h-full object-cover" />}
                    </div>

                    <h2 className="text-2xl font-bold text-highlight mb-2">{product.name}</h2>
                    <div className="flex items-end gap-2 mb-8">
                        <span className="text-xl font-bold text-highlight-red">NT$ {product.price}</span>
                        <span className="text-sm text-accent pb-1">/ {product.weight_grams}g</span>
                    </div>

                    <div className="space-y-8 text-sm text-highlight leading-relaxed mb-12">
                        <div>
                            <p className="whitespace-pre-line text-accent">{product.description}</p>
                        </div>
                        <div className="bg-cream border border-primary p-4 rounded-xl">
                            <span className="font-bold block mb-1">成分：</span>
                            <span className="text-accent whitespace-pre-line">{product.ingredients}</span>
                        </div>
                    </div>

                    {/* 底部固定加入購物車列 */}
                    <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-primary p-4 px-6 flex items-center justify-between gap-4 max-w-lg mx-auto z-40 shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
                        <div className="flex items-center bg-cream border border-primary rounded-full px-2 py-2">
                            <button onClick={() => setQuantity(Math.max(1, quantity - 1))} className="p-2 text-highlight hover:bg-primary rounded-full transition"><Icons.Minus /></button>
                            <span className="w-8 text-center font-bold text-highlight">{quantity}</span>
                            <button onClick={() => setQuantity(Math.min(maxQ, quantity + 1))} className="p-2 text-highlight hover:bg-primary rounded-full transition"><Icons.Plus /></button>
                        </div>
                        <button onClick={handleAdd} className="flex-1 bg-highlight text-white py-4 rounded-full font-bold tracking-widest shadow-md hover:bg-highlight-dark transition-colors">
                            加入購物車
                        </button>
                    </div>
                </motion.div>
            );
        };

        // --- 購物車頁面 ---
        const CartView = ({ cart, updateQuantity, removeItem, settings, onNavigate }) => {
            const subtotal = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
            const shippingFee = parseInt(settings.shipping_fee) || 60;
            const total = subtotal + shippingFee;

            if (cart.length === 0) {
                return (
                    <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="pt-32 px-6 text-center max-w-lg mx-auto">
                        <div className="w-20 h-20 bg-primary opacity-30 rounded-full flex items-center justify-center mx-auto mb-6">
                            <Icons.Cart />
                        </div>
                        <h2 className="text-xl font-bold text-highlight mb-4">購物車是空的</h2>
                        <button onClick={() => onNavigate('products')} className="text-accent underline underline-offset-4">去逛逛餅乾</button>
                    </motion.div>
                );
            }

            return (
                <motion.div initial={{ opacity: 0, x: 20 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0 }} className="pt-24 pb-32 px-6 max-w-lg mx-auto">
                    <div className="flex justify-between items-center mb-8">
                        <h2 className="text-xl font-bold tracking-widest text-highlight">購物車</h2>
                        <button onClick={() => onNavigate('products')} className="text-sm text-accent underline">繼續選購</button>
                    </div>

                    <div className="space-y-6 mb-12">
                        {cart.map(item => (
                            <div key={item.id} className="flex items-center gap-4 bg-white p-4 rounded-2xl shadow-sm border border-primary border-opacity-30">
                                <img src={item.main_image_url} alt={item.name} className="w-20 h-20 object-cover rounded-xl" />
                                <div className="flex-1">
                                    <h3 className="font-bold text-highlight text-sm mb-1">{item.name}</h3>
                                    <p className="text-highlight-red font-medium text-sm mb-2">NT$ {item.price}</p>
                                    <div className="flex items-center justify-between">
                                        <div className="flex items-center bg-cream border border-primary rounded-full px-1 py-1">
                                            <button onClick={() => updateQuantity(item.id, item.quantity - 1)} className="p-1 text-accent"><Icons.Minus /></button>
                                            <span className="w-6 text-center text-sm font-bold">{item.quantity}</span>
                                            <button onClick={() => updateQuantity(item.id, item.quantity + 1)} className="p-1 text-accent"><Icons.Plus /></button>
                                        </div>
                                        <button onClick={() => removeItem(item.id)} className="p-2 text-accent hover:text-highlight-red"><Icons.Trash /></button>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="bg-primary bg-opacity-10 p-6 rounded-3xl space-y-3 text-sm text-highlight mb-8">
                        <div className="flex justify-between"><span>小計</span><span>NT$ {subtotal}</span></div>
                        <div className="flex justify-between"><span>運費 ({settings.shipping_method})</span><span>NT$ {shippingFee}</span></div>
                        <div className="border-t border-primary border-opacity-30 pt-3 flex justify-between font-bold text-lg mt-2">
                            <span>總計</span><span className="text-highlight-red">NT$ {total}</span>
                        </div>
                    </div>

                    <button onClick={() => onNavigate('checkout')} className="w-full bg-highlight text-white py-4 rounded-full font-bold tracking-widest shadow-md hover:bg-highlight-dark transition-colors">
                        填寫寄送資料
                    </button>
                </motion.div>
            );
        };

        // --- 結帳表單頁 ---
        const CheckoutView = ({ cart, settings, onNavigate, onSubmitOrder }) => {
            const [formData, setFormData] = useState({
                customer_name: '', phone: '', ig_account: '', email: '', cvs_store_name: '', cvs_store_number: ''
            });
            const [isSubmitting, setIsSubmitting] = useState(false);

            const subtotal = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
            const shippingFee = parseInt(settings.shipping_fee) || 60;
            
            const handleChange = (e) => setFormData({ ...formData, [e.target.name]: e.target.value });

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                
                const orderData = {
                    ...formData,
                    items: cart.map(item => ({ id: item.id, name: item.name, quantity: item.quantity, price: item.price })),
                    subtotal: subtotal,
                    shipping_fee: shippingFee,
                    total_price: subtotal + shippingFee
                };

                const success = await onSubmitOrder(orderData);
                setIsSubmitting(false);
                if (success) {
                    onNavigate('success');
                } else {
                    alert('訂單送出失敗，請稍後再試或私訊 IG 聯繫我們。');
                }
            };

            return (
                <motion.div initial={{ opacity: 0, x: 20 }} animate={{ opacity: 1, x: 0 }} className="pt-24 pb-32 px-6 max-w-lg mx-auto">
                    <button onClick={() => onNavigate('cart')} className="flex items-center text-accent mb-8 hover:text-highlight">
                        <Icons.ArrowLeft /> <span className="ml-2 text-sm font-medium">返回購物車</span>
                    </button>

                    <h2 className="text-2xl font-bold tracking-widest text-highlight mb-6">收件資訊</h2>
                    <p className="text-xs text-accent mb-8">本次寄送一律使用 {settings.shipping_method}，請確實填寫真實姓名與門市資訊。</p>

                    <form onSubmit={handleSubmit} className="space-y-5">
                        <div>
                            <label className="block text-sm font-bold text-highlight mb-1">真實姓名 *</label>
                            <input required type="text" name="customer_name" value={formData.customer_name} onChange={handleChange} className="w-full border-b border-primary py-2 bg-transparent focus:outline-none focus:border-highlight transition-colors" placeholder="取件核對身份用" />
                        </div>
                        <div>
                            <label className="block text-sm font-bold text-highlight mb-1">手機號碼 *</label>
                            <input required type="tel" name="phone" value={formData.phone} onChange={handleChange} className="w-full border-b border-primary py-2 bg-transparent focus:outline-none focus:border-highlight transition-colors" placeholder="09xxxxxxxx" />
                        </div>
                        <div>
                            <label className="block text-sm font-bold text-highlight mb-1">IG 帳號 *</label>
                            <input required type="text" name="ig_account" value={formData.ig_account} onChange={handleChange} className="w-full border-b border-primary py-2 bg-transparent focus:outline-none focus:border-highlight transition-colors" placeholder="聯絡及後續通知用" />
                        </div>
                        <div>
                            <label className="block text-sm font-bold text-highlight mb-1">Email</label>
                            <input type="email" name="email" value={formData.email} onChange={handleChange} className="w-full border-b border-primary py-2 bg-transparent focus:outline-none focus:border-highlight transition-colors" placeholder="選填" />
                        </div>
                        
                        <div className="pt-4 border-t border-primary border-opacity-30">
                            <h3 className="font-bold text-highlight mb-4">7-11 取件門市</h3>
                            <div className="space-y-4">
                                <div>
                                    <label className="block text-sm font-bold text-highlight mb-1">門市名稱 *</label>
                                    <input required type="text" name="cvs_store_name" value={formData.cvs_store_name} onChange={handleChange} className="w-full border-b border-primary py-2 bg-transparent focus:outline-none focus:border-highlight transition-colors" placeholder="例如：台大門市" />
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-highlight mb-1">門市店號 *</label>
                                    <input required type="text" name="cvs_store_number" value={formData.cvs_store_number} onChange={handleChange} className="w-full border-b border-primary py-2 bg-transparent focus:outline-none focus:border-highlight transition-colors" placeholder="6碼數字" />
                                </div>
                            </div>
                        </div>

                        <div className="pt-8">
                            <button type="submit" disabled={isSubmitting} className="w-full bg-highlight text-white py-4 rounded-full font-bold tracking-widest shadow-md hover:bg-highlight-dark transition-colors disabled:opacity-50 flex justify-center items-center">
                                {isSubmitting ? '處理中...' : `確認送出 (NT$ ${subtotal + shippingFee})`}
                            </button>
                        </div>
                    </form>
                </motion.div>
            );
        };

        // --- 成功頁面 ---
        const SuccessView = ({ orderId, onNavigate }) => (
            <motion.div initial={{ opacity: 0, scale: 0.95 }} animate={{ opacity: 1, scale: 1 }} className="pt-32 px-6 text-center max-w-lg mx-auto">
                <div className="w-24 h-24 bg-primary bg-opacity-20 rounded-full flex items-center justify-center mx-auto mb-8 text-highlight text-4xl">
                    🎉
                </div>
                <h2 className="text-2xl font-bold text-highlight mb-4">訂單已送出！</h2>
                <p className="text-accent text-sm mb-2">感謝您的訂購，我們會盡快為您製作。</p>
                {orderId && <p className="bg-cream border border-primary p-3 rounded-lg text-sm font-medium text-highlight mb-8 inline-block">訂單編號: {orderId}</p>}
                
                <div className="text-left bg-white p-6 rounded-2xl shadow-sm border border-primary border-opacity-30 text-sm text-highlight leading-relaxed mb-8">
                    <p className="font-bold mb-2">接下來請注意：</p>
                    <ol className="list-decimal list-inside space-y-2 text-accent">
                        <li>我們會透過 IG 訊息與您核對訂單與匯款資訊。</li>
                        <li>匯款完成後才算訂單成立。</li>
                        <li>出貨時會另行通知。</li>
                    </ol>
                </div>

                <button onClick={() => onNavigate('home')} className="text-accent underline underline-offset-4 font-bold">返回首頁</button>
            </motion.div>
        );


        // ==========================================
        // 4. 主應用程式 (狀態管理)
        // ==========================================
        const App = () => {
            const [view, setView] = useState('home'); // home, products, productDetail, cart, checkout, success
            const [activeProductId, setActiveProductId] = useState(null);
            
            const [cart, setCart] = useState([]);
            const [settings, setSettings] = useState(mockData.settings);
            const [products, setProducts] = useState(mockData.products);
            const [loading, setLoading] = useState(true);
            const [lastOrderId, setLastOrderId] = useState(null);

            // 載入資料
            useEffect(() => {
                const fetchData = async () => {
                    if (!API_URL || API_URL === "https://script.google.com/macros/s/AKfycbz27imZO4YtNtD2s8CKJh5GiiVf_lk8iwwNMbK3pDRfoJE9DEAUdon_vpf6TQTJzdB43w/exec") {
                        console.log("Using Mock Data (API_URL not set)");
                        setLoading(false);
                        return;
                    }
                    try {
                        const response = await fetch(API_URL);
                        const result = await response.json();
                        if (result.status === 'success') {
                            setSettings(result.data.settings);
                            setProducts(result.data.products);
                        }
                    } catch (error) {
                        console.error("Fetch data failed, falling back to mock data", error);
                    } finally {
                        setLoading(false);
                    }
                };
                fetchData();
            }, []);

            // 導航邏輯
            const navigate = (targetView, id = null) => {
                window.scrollTo(0, 0);
                if (targetView === 'productDetail') setActiveProductId(id);
                setView(targetView);
            };

            // 購物車邏輯
            const addToCart = (product) => {
                setCart(prev => {
                    const existing = prev.find(item => item.id === product.id);
                    if (existing) {
                        return prev.map(item => item.id === product.id ? { ...item, quantity: item.quantity + product.quantity } : item);
                    }
                    return [...prev, product];
                });
            };

            const updateQuantity = (id, newQuantity) => {
                if (newQuantity < 1) return;
                const productDef = products.find(p => p.id === id);
                const maxQ = productDef ? (parseInt(productDef.max_quantity) || 99) : 99;
                if (newQuantity > maxQ) return;
                
                setCart(prev => prev.map(item => item.id === id ? { ...item, quantity: newQuantity } : item));
            };

            const removeItem = (id) => {
                setCart(prev => prev.filter(item => item.id !== id));
            };

            // 送出訂單邏輯
            const submitOrder = async (orderData) => {
                if (!API_URL || API_URL === "https://script.google.com/macros/s/AKfycbz27imZO4YtNtD2s8CKJh5GiiVf_lk8iwwNMbK3pDRfoJE9DEAUdon_vpf6TQTJzdB43w/exec") {
                    console.log("Mock Submit:", orderData);
                    setLastOrderId("ORD-MOCK-1234");
                    setCart([]);
                    return true;
                }

                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        body: JSON.stringify(orderData),
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' } // 避免 CORS OPTIONS 預檢
                    });
                    const result = await response.json();
                    if (result.status === 'success') {
                        setLastOrderId(result.orderId);
                        setCart([]); // 清空購物車
                        return true;
                    }
                    return false;
                } catch (error) {
                    console.error("Submit order failed", error);
                    return false;
                }
            };

            // 取得當前要渲染的產品
            const activeProduct = useMemo(() => products.find(p => p.id === activeProductId), [products, activeProductId]);
            const cartItemCount = cart.reduce((sum, item) => sum + item.quantity, 0);

            if (loading) {
                return <div className="min-h-screen flex items-center justify-center text-highlight tracking-widest font-bold">載入中...</div>;
            }

            return (
                <div className="min-h-screen relative font-sans">
                    {/* Header (成功頁面隱藏購物車圖示) */}
                    {view !== 'success' && <Navbar cartCount={cartItemCount} onNavigate={navigate} logoUrl={settings.logo_image_url} />}

                    {/* 主要內容區塊，使用 AnimatePresence 處理過場 */}
                    <AnimatePresence mode="wait">
                        {view === 'home' && <HomeView key="home" settings={settings} onNavigate={navigate} />}
                        {view === 'products' && <ProductsView key="products" products={products} onNavigate={navigate} />}
                        {view === 'productDetail' && activeProduct && <ProductDetailView key={`product-${activeProductId}`} product={activeProduct} onNavigate={navigate} onAddToCart={addToCart} />}
                        {view === 'cart' && <CartView key="cart" cart={cart} updateQuantity={updateQuantity} removeItem={removeItem} settings={settings} onNavigate={navigate} />}
                        {view === 'checkout' && <CheckoutView key="checkout" cart={cart} settings={settings} onNavigate={navigate} onSubmitOrder={submitOrder} />}
                        {view === 'success' && <SuccessView key="success" orderId={lastOrderId} onNavigate={navigate} />}
                    </AnimatePresence>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
